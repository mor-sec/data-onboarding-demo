<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Onboarding Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: #F3F2F2; color: #032D60; }
  input, textarea, select, button { font-family: 'IBM Plex Sans', sans-serif; }
  :root {
    --blue:       #0176D3;
    --blue-dark:  #014486;
    --blue-light: #D8EDFF;
    --navy:       #032D60;
    --navy-mid:   #1B4F8A;
    --gray-0:     #FFFFFF;
    --gray-1:     #F3F2F2;
    --gray-2:     #E5E5E5;
    --gray-3:     #DDDBDA;
    --gray-4:     #C9C7C5;
    --gray-5:     #706E6B;
    --gray-6:     #444444;
    --amber:      #A86403;
    --amber-bg:   #FEF3E2;
    --amber-border:#FDD89B;
    --green:      #2E844A;
    --green-bg:   #EEF4EB;
    --red:        #BA0517;
    --red-bg:     #FEF1EE;
    --shadow-sm:  0 1px 3px rgba(0,0,0,.1);
    --radius:     6px;
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #C9C7C5; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Component scripts — ORDER MATTERS -->
<script type="text/babel" src="portal/ui.jsx"></script>
<script type="text/babel" src="portal/chain.jsx"></script>
<script type="text/babel" src="portal/requester.jsx"></script>
<script type="text/babel" src="portal/approver.jsx"></script>
<script type="text/babel" src="portal/admin.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "role": "requester",
  "accentColor": "#0176D3"
}/*EDITMODE-END*/;

// ── SIDEBAR ────────────────────────────────────────────────────────────────
const NAV = {
  requester: [{ id:'new',  label:'New Request',   icon:'＋' }, { id:'mine', label:'My Requests', icon:'📄' }],
  owner:     [{ id:'queue',label:'Approval Queue', icon:'📋' }, { id:'hist', label:'History',      icon:'🕐' }],
  legal:     [{ id:'queue',label:'Legal Review',   icon:'⚖'  }, { id:'hist', label:'History',      icon:'🕐' }],
  privacy:   [{ id:'queue',label:'Privacy Review', icon:'🛡'  }, { id:'hist', label:'History',      icon:'🕐' }],
  custodian: [{ id:'queue',label:'Custodian Queue',icon:'🗄'  }, { id:'hist', label:'History',      icon:'🕐' }],
  ciso:      [{ id:'queue',label:'CISO Review',    icon:'🔐' }, { id:'hist', label:'History',      icon:'🕐' }],
  admin:     [{ id:'overview',label:'Overview',    icon:'📊' }, { id:'all',  label:'All Requests', icon:'🗂' }],
};

const Sidebar = ({ role, setRole, view, setView }) => (
  <div style={{ width:224, background:'var(--navy)', display:'flex', flexDirection:'column', flexShrink:0, minHeight:0 }}>
    <div style={{ padding:'20px 16px 16px', borderBottom:'1px solid rgba(255,255,255,.1)' }}>
      <div style={{ fontSize:10, fontWeight:700, color:'rgba(255,255,255,.38)', textTransform:'uppercase', letterSpacing:'0.12em', marginBottom:3 }}>GOV Data Platform</div>
      <div style={{ fontSize:15, fontWeight:700, color:'#fff' }}>Onboarding Hub</div>
    </div>

    {/* Role switcher */}
    <div style={{ padding:'12px 8px 4px' }}>
      <div style={{ fontSize:10, fontWeight:700, color:'rgba(255,255,255,.32)', textTransform:'uppercase', letterSpacing:'0.1em', paddingLeft:8, marginBottom:5 }}>Signed in as</div>
      {Object.entries(ROLE_CONFIG).map(([k,cfg])=>(
        <button key={k} onClick={()=>{ setRole(k); setView(NAV[k][0].id); }} style={{
          width:'100%', display:'flex', alignItems:'center', gap:9, padding:'6px 10px',
          borderRadius:5, border:'none', cursor:'pointer', fontSize:13, textAlign:'left',
          background: role===k ? 'rgba(255,255,255,.14)' : 'transparent',
          color: role===k ? '#fff' : 'rgba(255,255,255,.5)',
          fontWeight: role===k ? 600 : 400, marginBottom:1, transition:'all .15s',
        }}>
          <span style={{ fontSize:15 }}>{cfg.icon}</span>
          {cfg.label}
          {role===k && <span style={{ marginLeft:'auto', width:6, height:6, borderRadius:'50%', background:'var(--blue)', flexShrink:0 }}/>}
        </button>
      ))}
    </div>

    {/* Navigation */}
    <div style={{ borderTop:'1px solid rgba(255,255,255,.08)', padding:'10px 8px', marginTop:4 }}>
      <div style={{ fontSize:10, fontWeight:700, color:'rgba(255,255,255,.32)', textTransform:'uppercase', letterSpacing:'0.1em', paddingLeft:8, marginBottom:5 }}>Navigation</div>
      {(NAV[role]||[]).map(link=>(
        <button key={link.id} onClick={()=>setView(link.id)} style={{
          width:'100%', display:'flex', alignItems:'center', gap:10, padding:'7px 10px',
          borderRadius:5, border:'none', cursor:'pointer', fontSize:13, textAlign:'left',
          background: view===link.id ? 'rgba(255,255,255,.16)' : 'transparent',
          color: view===link.id ? '#fff' : 'rgba(255,255,255,.52)',
          fontWeight: view===link.id ? 600 : 400, marginBottom:1, transition:'all .15s',
        }}>
          <span style={{ fontSize:14 }}>{link.icon}</span>{link.label}
        </button>
      ))}
    </div>

    <div style={{ marginTop:'auto', padding:'12px 16px', borderTop:'1px solid rgba(255,255,255,.08)' }}>
      <div style={{ fontSize:11, color:'rgba(255,255,255,.35)' }}>Session</div>
      <div style={{ fontSize:13, fontWeight:600, color:'rgba(255,255,255,.75)', marginTop:2 }}>J. Nguyen · DHS</div>
      <div style={{ fontSize:11, color:'rgba(255,255,255,.3)', marginTop:1 }}>j.nguyen@health.gov.au</div>
    </div>
  </div>
);

// ── TWEAKS PANEL ───────────────────────────────────────────────────────────
const TweaksPanel = ({ show, tweaks, setTweaks }) => {
  if (!show) return null;
  return (
    <div style={{ position:'fixed', bottom:20, right:20, width:230, background:'#fff', border:'1px solid var(--gray-3)', borderRadius:8, boxShadow:'0 4px 20px rgba(0,0,0,.15)', zIndex:3000, padding:16 }}>
      <div style={{ fontSize:13, fontWeight:700, marginBottom:12 }}>Tweaks</div>
      <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
        <div>
          <div style={{ fontSize:11, fontWeight:700, color:'var(--gray-5)', marginBottom:7 }}>ACCENT COLOR</div>
          {[['#0176D3','Gov Blue'],['#1B6335','Forest'],['#5B0D5D','Aubergine']].map(([c,l])=>(
            <label key={c} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:5, cursor:'pointer', fontSize:13 }}>
              <input type="radio" name="acc" checked={tweaks.accentColor===c} onChange={()=>{
                const t={...tweaks,accentColor:c};
                setTweaks(t);
                document.documentElement.style.setProperty('--blue',c);
                window.parent.postMessage({type:'__edit_mode_set_keys',edits:t},'*');
              }}/>
              <div style={{ width:14,height:14,borderRadius:'50%',background:c,flexShrink:0 }}/>
              {l}
            </label>
          ))}
        </div>
      </div>
    </div>
  );
};

// ── APP ────────────────────────────────────────────────────────────────────
const App = () => {
  const [role, setRole]       = useState(() => localStorage.getItem('dop2-role') || TWEAK_DEFAULTS.role);
  const [view, setView]       = useState(() => NAV[localStorage.getItem('dop2-role')||TWEAK_DEFAULTS.role]?.[0]?.id || 'new');
  const [requests, setRequests] = useState(MOCK_REQUESTS);
  const [showTweaks, setShowTweaks] = useState(false);
  const [tweaks, setTweaks]   = useState(TWEAK_DEFAULTS);

  useEffect(()=>{ localStorage.setItem('dop2-role', role); }, [role]);

  useEffect(()=>{
    const handler = e => {
      if (e.data?.type==='__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type==='__deactivate_edit_mode')  setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const changeRole = (r) => { setRole(r); setView(NAV[r][0].id); };

  const mainContent = () => {
    if (role==='requester') {
      if (view==='new')  return <RequesterView requests={requests} setRequests={setRequests}/>;
      if (view==='mine') return <MyRequestsView requests={requests}/>;
    }
    if (role==='admin') return <AdminView requests={requests}/>;
    // All approver roles
    return <ApproverShell role={role} requests={requests} setRequests={setRequests}/>;
  };

  // pending badge for topbar
  const pendingForRole = role !== 'requester' && role !== 'admin'
    ? requests.filter(r => { const sId = ROLE_CONFIG[role]?.stepIds[0]; return sId && r.stepStatuses[sId]?.status==='active'; }).length
    : 0;

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
      <Sidebar role={role} setRole={changeRole} view={view} setView={setView}/>
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
        {/* Top bar */}
        <div style={{ background:'#fff', borderBottom:'1px solid var(--gray-2)', padding:'0 24px', height:48, display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <span style={{ fontWeight:700, color:'var(--navy)', fontSize:14 }}>{ROLE_CONFIG[role]?.label}</span>
            <span style={{ color:'var(--gray-4)' }}>·</span>
            <span style={{ color:'var(--gray-5)', fontSize:13 }}>Data Onboarding Portal</span>
          </div>
          <div style={{ display:'flex', gap:10, alignItems:'center' }}>
            {pendingForRole > 0 && (
              <div style={{ background:'var(--red-bg)', border:'1px solid #F5B3A9', borderRadius:12, padding:'2px 10px', fontSize:12, fontWeight:700, color:'var(--red)' }}>
                {pendingForRole} awaiting your review
              </div>
            )}
            <div style={{ background:'var(--green-bg)', border:'1px solid #A8D5B5', borderRadius:12, padding:'2px 10px', fontSize:11, fontWeight:700, color:'var(--green)' }}>SYSTEM LIVE</div>
          </div>
        </div>
        {/* Scrollable content */}
        <div style={{ flex:1, overflow:'auto', padding:'20px 24px' }}>
          {mainContent()}
        </div>
      </div>
      <TweaksPanel show={showTweaks} tweaks={tweaks} setTweaks={setTweaks}/>
    </div>
  );
};

// Defer until all component scripts are loaded
setTimeout(() => {
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}, 50);
</script>
</body>
</html>
